version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      svelte-stack:
        patterns:
          - svelte
          - "@sveltejs/*"
          - vite
          - "@vitejs/*"
      test-tooling:
        patterns:
          - vitest
          - playwright
          - "@playwright/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
