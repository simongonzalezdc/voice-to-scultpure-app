name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/setup-python@v5
      - run: |
          if [ -f package.json ]; then npm ci
          elif [ -f requirements.txt ]; then pip install -r requirements.txt
          else exit 1
          fi
      - run: npm run format
      - run: npm run lint
      - run: npm test
      - run: |
          if [ -f requirements.txt ]; then python -m pytest --tb=short
          fi
